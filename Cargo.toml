[workspace]
members = [
    "crates/*",
    "tools/refexec",
    "tools/parity-harness",
]
exclude = [
    "tools/corpus-sync",
    "tools/fixturegen",
    "tools/texlive-wasm-publish",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
ahash = "0.8"
anyhow = "1"
tempfile = "3"
similar = "2"
proptest = "1"
sha2 = "0.10"
serde = { version = "1", features = ["derive"] }
bincode = "1"
unicode-width = "0.2"

[profile.test]
opt-level = 3

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"
