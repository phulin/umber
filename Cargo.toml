[workspace]
members = [
    "crates/*",
    "tools/*",
]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"

[workspace.dependencies]
anyhow = "1"
tempfile = "3"
similar = "2"
proptest = "1"
trybuild = "1"

[profile.test]
opt-level = 3

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
dbg_macro = "deny"
todo = "deny"
unwrap_used = "deny"
