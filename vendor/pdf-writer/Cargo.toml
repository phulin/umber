[package]
name = "pdf-writer"
version = "0.15.0"
authors = ["Laurenz <laurmaedje@gmail.com>", "Martin Haug <mhaug@live.de>"]
edition = "2021"
description = "A step-by-step PDF writer."
repository = "https://github.com/typst/pdf-writer"
readme = "README.md"
license = "MIT OR Apache-2.0"
categories = ["encoding", "multimedia"]
keywords = ["pdf", "writer"]

[dependencies]
bitflags = "2"
itoa = "1"
memchr = "2"
ryu = "1"

[dev-dependencies]
miniz_oxide = "0.8"
