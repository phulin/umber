name: WASM

on:
  pull_request:
    paths:
      - ".github/workflows/wasm.yml"
      - "crates/umber-wasm/**"
      - "crates/umber/**"
      - "crates/tex-*/**"
      - "scripts/*wasm*"
  push:
    branches: [main]
    paths:
      - ".github/workflows/wasm.yml"
      - "crates/umber-wasm/**"
      - "crates/umber/**"
      - "crates/tex-*/**"
      - "scripts/*wasm*"

jobs:
  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.0
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: "152.0"
      - uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: "149"
      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.14.0 --locked
      - name: Install dprint
        run: npm install --global dprint@0.55.2
      - name: Native quality gate
        run: scripts/check-and-test.sh
      - name: Test optimized package in Firefox and Chrome
        run: CHROME="$(command -v chrome)" CHROME_NO_SANDBOX=1 scripts/check-wasm.sh
